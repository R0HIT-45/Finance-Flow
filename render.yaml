services:
  - type: web
    name: finance-flow-api
    runtime: node
    plan: free
    buildCommand: npm install && npm run build && npx prisma generate && npx prisma migrate deploy
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        value: file:/tmp/dev.db
    healthCheckPath: /health
    autoDeploy: true
